{% extends 'lostfound_app/base.html' %}

{% block content %}
<div class="form-card">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p style="margin-top: 15px;">
        Already have an account?
        <a href="{% url 'login' %}">Login here</a>
    </p>
</div>
{% endblock %}
