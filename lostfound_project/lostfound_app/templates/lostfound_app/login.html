{% extends 'lostfound_app/base.html' %}

{% block content %}
<div class="form-card">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p style="margin-top: 15px;">
        Don't have an account?
        <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
{% endblock %}
